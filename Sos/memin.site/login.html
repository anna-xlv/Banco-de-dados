<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class = superbox>
        <form id="login">
            <div class="TUDO">
                <h2>Login</h2>
                <div class="primeiro">
                    <label>Email:</label>
                    <input type="text" id="email" name="email" placeholder="Digite seu e-mail...">
                </div>
                <div class="segundo">
                    <label>Senha:</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha...">
                </div>
                <br><br>
                <div class="btn">
                    <button type="submit">Entrar</button>
                </div>
                <div class="cadastre">
                    <a href = "index.html">Não possui cadastro? Clique aqui</a>
                </div>
                <div id="resultado"></div>
                <div id="erro"></div>
            </div>
        </form>

        <div id="mensagem"></div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
