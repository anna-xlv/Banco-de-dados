<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de usuários</title>
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body>
<div class="container">
    

    <form id="usuarioForm">
        <h1>Cadastro de Usuário</h1>
        <input type="hidden" id="id">

        <div class="form-group">
            <label>Nome</label>
            
            <input type="text" id="nome" required />
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required />
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="senha" required />
        </div>

        <div class="form-group">
            <label>Perfil</label>
            <select id="perfil">
                <option value="USER">USER</option>
                <option value="ADMIN">ADMIN</option>
            </select>
        </div>

        <div class="form-group">
            <label>Endereço</label>
            <input type="text" id="endereco" />
        </div>

        <div class="form-group">
            <label>Bairro</label>
            <input type="text" id="bairro" />
        </div>

        <div class="form-group">
            <label>Complemento</label>
            <input type="text" id="complemento" />
        </div>

        <div class="form-group">
            <label>CEP</label>
            <input type="text" id="cep" />
        </div>

        <div class="form-group">
            <label>Cidade</label>
            <input type="text" id="cidade" />
        </div>

        <div class="form-group">
            <label>Estado</label>
            <input type="text" id="estado" />
        </div>

        <a href= "usuarios.html">
       <button type="submit" class="botao" id="botao">Cadastrar Usuário</button> </a>
        
        <div class="login">
            <a href = "login.html">Já tem um cadastro? Faça login aqui!</a>
        </div>
    
    </form>


    <div id="mensagem" class="mensagem"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const idUsuario = params.get('id');

    const form = document.getElementById('usuarioForm');
    const mensagem = document.getElementById('mensagem');

    if (idUsuario) {
        carregarUsuario(idUsuario);
    } else {
        senha.required = true;
    }

    function carregarUsuario(id) {
        fetch(`http://localhost:8080/usuarios/${id}`)
            .then(res => {
                if (!res.ok) throw new Error();
                return res.json();
            })
            .then(u => {
                document.getElementById('id').value = u.id;
                document.getElementById('nome').value = u.nome;
                document.getElementById('email').value = u.email;
                perfil.value = u.perfil;
                endereco.value = u.endereco || '';
                bairro.value = u.bairro || '';
                complemento.value = u.complemento || '';
                cep.value = u.cep || '';
                cidade.value = u.cidade || '';
                estado.value = u.estado || '';
            })
            .catch(() => {
                mensagem.innerHTML =
                    '<span class="erro">Erro ao carregar usuário para edição.</span>';
            });
    }

form.addEventListener('submit', function(e) {
    e.preventDefault();

    const usuario = {
        nome: document.getElementById('nome').value.trim(),
        email: document.getElementById('email').value.trim(),
        senha: document.getElementById('senha').value,
        perfil: document.getElementById('perfil').value,
        endereco: document.getElementById('endereco').value.trim(),
        bairro: document.getElementById('bairro').value.trim(),
        complemento: document.getElementById('complemento').value.trim(),
        cep: document.getElementById('cep').value.trim(),
        cidade: document.getElementById('cidade').value.trim(),
        estado: document.getElementById('estado').value.trim()
    };

    fetch('http://localhost:8080/usuarios', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(usuario)
    })
    .then(res => {
        if (!res.ok) throw new Error();
        alert("Usuário cadastrado com sucesso!");
        document.getElementById("botao").onclick = function () {
        window.location.href = "http://127.0.0.1:5500/usuarios.html";
};

    })
    .catch(() => {
        mensagem.innerHTML = '<span class="erro">Erro ao cadastrar usuário.</span>';
    });
});
</script>
</body>
</html>
